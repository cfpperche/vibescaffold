repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: detect-private-key

  - repo: local
    hooks:
      - id: biome-check
        name: biome check
        entry: bunx biome check --write
        language: system
        types: [file]
        files: \.(ts|tsx|js|jsx)$
